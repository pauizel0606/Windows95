<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Windows 95 Interactivo</title>
    <style>
        :root {
            --win-gray: #c0c0c0;
            --win-white: #ffffff;
            --win-dark-gray: #808080;
            --win-black: #000000;
            --win-blue: #000080;
            --win-desktop: #008080;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Tahoma', sans-serif;
            background-color: var(--win-desktop);
            overflow: hidden;
            user-select: none;
        }

        /* --- Escritorio --- */
        #desktop {
            width: 100vw;
            height: calc(100vh - 40px);
            position: relative;
        }

        .icon {
            position: absolute;
            width: 75px;
            text-align: center;
            color: white;
            font-size: 11px;
            cursor: pointer;
            padding: 5px;
            z-index: 5;
        }

        .icon img {
            width: 32px;
            height: 32px;
            display: block;
            margin: 0 auto 4px;
            pointer-events: none; /* Evita interferencia al arrastrar */
        }

        .icon span {
            background-color: transparent;
            padding: 1px;
        }

        .icon:active span {
            background-color: var(--win-blue);
            outline: 1px dotted white;
        }

        /* --- Ventanas --- */
        .window {
            position: absolute;
            min-width: 300px;
            background: var(--win-gray);
            border: 2px solid;
            border-color: var(--win-white) var(--win-black) var(--win-black) var(--win-white);
            box-shadow: 1px 1px 0 0 var(--win-dark-gray) inset;
            padding: 2px;
            display: none; /* Ocultas por defecto */
            z-index: 10;
        }

        .title-bar {
            background: var(--win-blue);
            color: white;
            padding: 3px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
        }

        .btn-close {
            width: 16px; height: 14px;
            background: var(--win-gray);
            border: 1px solid;
            border-color: var(--win-white) var(--win-black) var(--win-black) var(--win-white);
            font-family: Arial; font-size: 9px;
            cursor: pointer;
        }

        .window-content {
            background: white;
            margin: 2px;
            border: 2px solid var(--win-dark-gray);
            padding: 15px;
            font-size: 13px;
            min-height: 100px;
        }

        /* --- Barra de tareas --- */
        #taskbar {
            position: fixed; bottom: 0; width: 100%; height: 40px;
            background: var(--win-gray);
            border-top: 2px solid var(--win-white);
            display: flex; align-items: center; padding: 2px;
            box-sizing: border-box; z-index: 100;
        }

        #start-btn {
            height: 30px; padding: 0 10px; font-weight: bold;
            border: 2px solid;
            border-color: var(--win-white) var(--win-black) var(--win-black) var(--win-white);
            display: flex; align-items: center; gap: 5px; cursor: pointer;
        }

        .tray {
            margin-left: auto; border: 2px solid;
            border-color: var(--win-dark-gray) var(--win-white) var(--win-white) var(--win-dark-gray);
            padding: 0 10px; height: 25px; display: flex; align-items: center; font-size: 12px;
        }
    </style>
</head>
<body>

<div id="desktop">
    <div class="icon" style="top: 20px; left: 20px;" ondblclick="openWindow('win-pc')">
        <img src="https://win98icons.alexmeub.com/icons/png/computer_explorer-5.png">
        <span>Mi PC</span>
    </div>

    <div class="icon" style="top: 100px; left: 20px;" ondblclick="openWindow('win-trash')">
        <img src="https://win98icons.alexmeub.com/icons/png/recycle_bin_empty-4.png">
        <span>Papelera</span>
    </div>

    <div id="win-pc" class="window" style="top: 100px; left: 200px;">
        <div class="title-bar">
            <span>Mi PC</span>
            <button class="btn-close" onclick="closeWindow('win-pc')">X</button>
        </div>
        <div class="window-content">
            Explorando unidades... <br><br>
            (C:) Disco Local<br>
            (A:) Disquete 3½
        </div>
    </div>

    <div id="win-trash" class="window" style="top: 150px; left: 250px;">
        <div class="title-bar">
            <span>Papelera de reciclaje</span>
            <button class="btn-close" onclick="closeWindow('win-trash')">X</button>
        </div>
        <div class="window-content">
            La papelera está vacía.
        </div>
    </div>
</div>

<div id="taskbar">
    <div id="start-btn">
        <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="16">
        Inicio
    </div>
    <div class="tray" id="clock">12:00 PM</div>
</div>

<script>
    // --- Lógica de Arrastrar (Drag and Drop) ---
    let activeElement = null;
    let offset = { x: 0, y: 0 };

    document.addEventListener('mousedown', (e) => {
        if (e.target.closest('.icon')) {
            activeElement = e.target.closest('.icon');
            const rect = activeElement.getBoundingClientRect();
            offset.x = e.clientX - rect.left;
            offset.y = e.clientY - rect.top;
            activeElement.style.zIndex = 1000;
        }
    });

    document.addEventListener('mousemove', (e) => {
        if (activeElement) {
            activeElement.style.left = (e.clientX - offset.x) + 'px';
            activeElement.style.top = (e.clientY - offset.y) + 'px';
        }
    });

    document.addEventListener('mouseup', () => {
        if (activeElement) {
            activeElement.style.zIndex = 5;
            activeElement = null;
        }
    });

    // --- Gestión de Ventanas ---
    function openWindow(id) {
        document.getElementById(id).style.display = 'block';
    }

    function closeWindow(id) {
        document.getElementById(id).style.display = 'none';
    }

    // --- Reloj ---
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
