<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escritorio Windows 95</title>
    <style>
        /* Definición de colores y estilos básicos */
        :root {
            --win95-bg: #008080; /* Color de fondo turquesa clásico */
            --win95-gray: #c0c0c0; /* Gris de ventanas y barras */
            --win95-border-light: #ffffff;
            --win95-border-dark: #808080;
            --win95-border-black: #000000;
            --win95-blue-title: #000080; /* Azul de barra de título */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: "Pixelated MS Sans Serif", Arial, sans-serif; /* Intento de fuente pixelada */
            background-color: var(--win95-bg);
        }

        /* --- Escritorio y Contenedor de Iconos --- */
        #desktop {
            height: calc(100vh - 40px); /* Resta la altura de la barra de tareas */
            position: relative;
            padding: 10px;
            box-sizing: border-box;
        }

        .icon-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80px;
        }

        .icon {
            text-align: center;
            cursor: pointer;
            color: #ffffff;
            text-shadow: 1px 1px #000000;
        }

        .icon img {
            width: 32px;
            height: 32px;
            display: block;
            margin: 0 auto 5px;
        }

        .icon span {
            font-size: 11px;
            display: block;
            margin-top: 2px;
        }

        /* --- Ventana de Ejemplo (Opcional, para decoración) --- */
        .window {
            position: absolute;
            top: 50px;
            left: 150px;
            width: 400px;
            background-color: var(--win95-gray);
            border: 2px solid;
            border-color: var(--win95-border-light) var(--win95-border-black) var(--win95-border-black) var(--win95-border-light);
            box-shadow: 1px 1px 0 0 var(--win95-border-dark) inset;
        }

        .title-bar {
            background-color: var(--win95-blue-title);
            color: #ffffff;
            padding: 3px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
        }

        .title-bar-controls button {
            width: 16px;
            height: 14px;
            background-color: var(--win95-gray);
            border: 1px solid;
            border-color: var(--win95-border-light) var(--win95-border-black) var(--win95-border-black) var(--win95-border-light);
            font-size: 9px;
            font-weight: bold;
            padding: 0;
            cursor: pointer;
        }

        .window-body {
            padding: 10px;
            font-size: 12px;
            color: #000000;
        }

        /* --- Barra de Tareas --- */
        #taskbar {
            height: 40px;
            background-color: var(--win95-gray);
            border-top: 2px solid var(--win95-border-light);
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 5px;
            box-sizing: border-box;
            z-index: 100;
        }

        #start-button {
            display: flex;
            align-items: center;
            gap: 5px;
            background-color: var(--win95-gray);
            border: 2px solid;
            border-color: var(--win95-border-light) var(--win95-border-black) var(--win95-border-black) var(--win95-border-light);
            padding: 2px 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        #start-button:active {
            border-color: var(--win95-border-black) var(--win95-border-light) var(--win95-border-light) var(--win95-border-black);
        }

        #start-button img {
            width: 18px;
            height: 18px;
        }

        #notification-area {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 2px solid;
            border-color: var(--win95-border-dark) var(--win95-border-light) var(--win95-border-light) var(--win95-border-dark);
            padding: 0 8px;
            height: 28px;
            background-color: var(--win95-gray);
        }

        #clock {
            font-size: 12px;
            color: #000000;
        }

        #volume-icon {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>

    <div id="desktop">
        <div class="icon-container">
            <div class="icon">
                <img src="https://win98icons.alexmeub.com/icons/png/computer_explorer-5.png" alt="Mi PC">
                <span>Mi PC</span>
            </div>
            <div class="icon">
                <img src="https://win98icons.alexmeub.com/icons/png/recycle_bin_empty-4.png" alt="Papelera de reciclaje">
                <span>Papelera de<br>reciclaje</span>
            </div>
            <div class="icon">
                <img src="https://win98icons.alexmeub.com/icons/png/msie1-2.png" alt="The Internet">
                <span>The Internet</span>
            </div>
            <div class="icon">
                <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png" alt="Mis documentos">
                <span>Mis<br>documentos</span>
            </div>
        </div>

        <div class="window">
            <div class="title-bar">
                <span>Bienvenido a Windows 95</span>
                <div class="title-bar-controls">
                    <button>_</button>
                    <button style="margin-left: 2px;">X</button>
                </div>
            </div>
            <div class="window-body">
                <p>Este es un ejemplo de cómo se vería una ventana.</p>
                <p>Los iconos en el escritorio son idénticos a los originales.</p>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <button id="start-button">
            <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" alt="Inicio">
            Inicio
        </button>

        <div id="notification-area">
            <img id="volume-icon" src="https://win98icons.alexmeub.com/icons/png/loudspeaker_rays-0.png" alt="Volumen">
            <span id="clock">12:00 PM</span>
        </div>
    </div>

    <script>
        // Función para actualizar el reloj
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // la hora 0 debe ser 12
            minutes = minutes < 10 ? '0' + minutes : minutes;
            const strTime = hours + ':' + minutes + ' ' + ampm;
            document.getElementById('clock').textContent = strTime;
        }

        // Actualizar el reloj cada segundo
        setInterval(updateClock, 1000);
        updateClock(); // Llamada inicial para establecer la hora de inmediato
    </script>
</body>
</html>
