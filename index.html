<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Windows 95 Desktop</title>

<style>

body{
margin:0;
background:#008080;
font-family:Tahoma, sans-serif;
height:100vh;
overflow:hidden;
}

/* DESKTOP */

.desktop{
padding:20px;
display:flex;
flex-direction:column;
gap:30px;
width:120px;
}

/* ICONOS */

.icon{
color:white;
text-align:center;
cursor:pointer;
width:70px;
font-size:13px;
text-shadow:1px 1px 0 #000;
}

.icon img{
width:32px;
height:32px;
display:block;
margin:auto;
margin-bottom:5px;
}

/* VENTANAS */

.window{
position:absolute;
top:120px;
left:260px;
width:320px;
background:#c0c0c0;
border-top:3px solid white;
border-left:3px solid white;
border-right:3px solid #404040;
border-bottom:3px solid #404040;
display:none;
}

.titlebar{
background:linear-gradient(to right,#000080,#1084d0);
color:white;
padding:4px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.closebtn{
width:18px;
height:18px;
background:#c0c0c0;
border-top:2px solid white;
border-left:2px solid white;
border-right:2px solid #404040;
border-bottom:2px solid #404040;
cursor:pointer;
}

/* CONTENIDO */

.content{
padding:10px;
}

/* TASKBAR */

.taskbar{
position:absolute;
bottom:0;
left:0;
width:100%;
height:40px;
background:#c0c0c0;
border-top:3px solid white;
display:flex;
align-items:center;
justify-content:space-between;
}

/* START BUTTON */

.start{
margin-left:5px;
display:flex;
align-items:center;
gap:6px;
padding:4px 10px;
font-weight:bold;
background:#c0c0c0;
border-top:2px solid white;
border-left:2px solid white;
border-right:2px solid #404040;
border-bottom:2px solid #404040;
cursor:pointer;
}

.start img{
width:20px;
}

/* START MENU */

.startmenu{
position:absolute;
bottom:40px;
left:5px;
width:200px;
background:#c0c0c0;
border-top:3px solid white;
border-left:3px solid white;
border-right:3px solid #404040;
border-bottom:3px solid #404040;
display:none;
}

.menuitem{
padding:8px;
cursor:pointer;
}

.menuitem:hover{
background:#000080;
color:white;
}

/* CLOCK */

.clock{
margin-right:10px;
background:#c0c0c0;
padding:3px 8px;
border-top:2px solid #404040;
border-left:2px solid #404040;
border-right:2px solid white;
border-bottom:2px solid white;
}

</style>
</head>

<body>

<div class="desktop">

<div class="icon" onclick="openWindow('computer')">
<img src="https://cdn.jsdelivr.net/gh/win98icons/win98icons/icons/png/computer_explorer-0.png">
My Computer
</div>

<div class="icon" onclick="openWindow('notes')">
<img src="https://cdn.jsdelivr.net/gh/win98icons/win98icons/icons/png/notepad-0.png">
Notepad
</div>

<div class="icon" onclick="openWindow('info')">
<img src="https://cdn.jsdelivr.net/gh/win98icons/win98icons/icons/png/help_book_big-0.png">
About
</div>

</div>


<!-- WINDOW COMPUTER -->

<div id="computer" class="window">

<div class="titlebar">
<span>My Computer</span>
<div class="closebtn" onclick="closeWindow('computer')"></div>
</div>

<div class="content">
<p>Bienvenido a tu escritorio retro.</p>
</div>

</div>


<!-- WINDOW NOTES -->

<div id="notes" class="window">

<div class="titlebar">
<span>Notepad</span>
<div class="closebtn" onclick="closeWindow('notes')"></div>
</div>

<div class="content">
<textarea style="width:100%;height:120px;"></textarea>
</div>

</div>


<!-- WINDOW INFO -->

<div id="info" class="window">

<div class="titlebar">
<span>About</span>
<div class="closebtn" onclick="closeWindow('info')"></div>
</div>

<div class="content">
<h3>Retro Desktop</h3>
<p>Mini escritorio inspirado en Windows 95.</p>
</div>

</div>


<!-- START MENU -->

<div id="startmenu" class="startmenu">

<div class="menuitem" onclick="openWindow('computer')">
My Computer
</div>

<div class="menuitem" onclick="openWindow('notes')">
Notepad
</div>

<div class="menuitem" onclick="openWindow('info')">
About
</div>

</div>


<!-- TASKBAR -->

<div class="taskbar">

<div class="start" onclick="toggleStart()">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Windows_logo_-_1995.svg">
Start
</div>

<div id="clock" class="clock"></div>

</div>


<script>

function openWindow(id){
document.getElementById(id).style.display="block"
}

function closeWindow(id){
document.getElementById(id).style.display="none"
}

function toggleStart(){

let menu=document.getElementById("startmenu")

if(menu.style.display==="block"){
menu.style.display="none"
}else{
menu.style.display="block"
}

}

/* CLOCK */

function updateClock(){

let now=new Date()

let h=String(now.getHours()).padStart(2,"0")
let m=String(now.getMinutes()).padStart(2,"0")

document.getElementById("clock").innerText=h+":"+m

}

setInterval(updateClock,1000)

updateClock()

</script>

</body>
</html>
